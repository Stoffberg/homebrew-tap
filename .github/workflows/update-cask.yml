name: Update Record Cask

on:
  repository_dispatch:
    types: [update-record-cask]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., 0.2.0)"
        required: true
      arm64_sha:
        description: "SHA256 for macOS ARM64 DMG"
        required: true
      x64_sha:
        description: "SHA256 for macOS x64 DMG"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "arm64_sha=${{ github.event.client_payload.arm64_sha }}" >> $GITHUB_OUTPUT
            echo "x64_sha=${{ github.event.client_payload.x64_sha }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "arm64_sha=${{ github.event.inputs.arm64_sha }}" >> $GITHUB_OUTPUT
            echo "x64_sha=${{ github.event.inputs.x64_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Update cask
        run: |
          sed -i 's/version ".*"/version "${{ steps.vars.outputs.version }}"/' Casks/record.rb
          sed -i '0,/sha256 ".*"/{s/sha256 ".*"/sha256 "${{ steps.vars.outputs.x64_sha }}"/}' Casks/record.rb
          sed -i '/on_arm/,/end/{s/sha256 ".*"/sha256 "${{ steps.vars.outputs.arm64_sha }}"/}' Casks/record.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/record.rb
          git commit -m "Update record to v${{ steps.vars.outputs.version }}" || echo "No changes to commit"
          git push
