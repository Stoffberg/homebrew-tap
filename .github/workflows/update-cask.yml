name: Update Record Cask

on:
  repository_dispatch:
    types: [update-record-cask]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., 0.2.0)"
        required: true
      arm64_sha:
        description: "SHA256 for macOS ARM64 DMG"
        required: true
      x64_sha:
        description: "SHA256 for macOS x64 DMG"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "arm64_sha=${{ github.event.client_payload.arm64_sha }}" >> $GITHUB_OUTPUT
            echo "x64_sha=${{ github.event.client_payload.x64_sha }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "arm64_sha=${{ github.event.inputs.arm64_sha }}" >> $GITHUB_OUTPUT
            echo "x64_sha=${{ github.event.inputs.x64_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Update cask
        run: |
          mkdir -p Casks
          cat > Casks/record.rb << 'CASK'
          cask "record" do
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_intel do
              sha256 "X64_SHA_PLACEHOLDER"
              url "https://github.com/Stoffberg/record/releases/download/v#{version}/Record_#{version}_x64.dmg"
            end
            on_arm do
              sha256 "ARM64_SHA_PLACEHOLDER"
              url "https://github.com/Stoffberg/record/releases/download/v#{version}/Record_#{version}_aarch64.dmg"
            end

            name "Record"
            desc "Privacy-first activity tracker for macOS"
            homepage "https://github.com/Stoffberg/record"

            app "Record.app"

            zap trash: [
              "~/Library/Application Support/dev.stoff.record",
            ]
          end
          CASK
          sed -i "s/VERSION_PLACEHOLDER/${{ steps.vars.outputs.version }}/g" Casks/record.rb
          sed -i "s/ARM64_SHA_PLACEHOLDER/${{ steps.vars.outputs.arm64_sha }}/g" Casks/record.rb
          sed -i "s/X64_SHA_PLACEHOLDER/${{ steps.vars.outputs.x64_sha }}/g" Casks/record.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/record.rb
          git commit -m "Update record to v${{ steps.vars.outputs.version }}" || echo "No changes to commit"
          git push
