name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., 0.1.0)"
        required: true
      darwin_x64_sha:
        description: "SHA256 for macOS x64"
        required: true
      darwin_arm64_sha:
        description: "SHA256 for macOS ARM64"
        required: true
      linux_x64_sha:
        description: "SHA256 for Linux x64"
        required: true
      linux_arm64_sha:
        description: "SHA256 for Linux ARM64"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set variables from dispatch
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "darwin_x64=${{ github.event.client_payload.darwin_x64_sha }}" >> $GITHUB_OUTPUT
            echo "darwin_arm64=${{ github.event.client_payload.darwin_arm64_sha }}" >> $GITHUB_OUTPUT
            echo "linux_x64=${{ github.event.client_payload.linux_x64_sha }}" >> $GITHUB_OUTPUT
            echo "linux_arm64=${{ github.event.client_payload.linux_arm64_sha }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "darwin_x64=${{ github.event.inputs.darwin_x64_sha }}" >> $GITHUB_OUTPUT
            echo "darwin_arm64=${{ github.event.inputs.darwin_arm64_sha }}" >> $GITHUB_OUTPUT
            echo "linux_x64=${{ github.event.inputs.linux_x64_sha }}" >> $GITHUB_OUTPUT
            echo "linux_arm64=${{ github.event.inputs.linux_arm64_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Update formula
        run: |
          cat > Formula/shrd.rb << 'EOF'
          class Shrd < Formula
            desc "Share anything instantly - CLI-first content sharing"
            homepage "https://github.com/Stoffberg/shrd.sh"
            version "${{ steps.vars.outputs.version }}"
            license "MIT"

            on_macos do
              on_intel do
                url "https://github.com/Stoffberg/shrd.sh/releases/download/cli-v#{version}/shrd-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.vars.outputs.darwin_x64 }}"
              end
              on_arm do
                url "https://github.com/Stoffberg/shrd.sh/releases/download/cli-v#{version}/shrd-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.vars.outputs.darwin_arm64 }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/Stoffberg/shrd.sh/releases/download/cli-v#{version}/shrd-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.vars.outputs.linux_x64 }}"
              end
              on_arm do
                url "https://github.com/Stoffberg/shrd.sh/releases/download/cli-v#{version}/shrd-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.vars.outputs.linux_arm64 }}"
              end
            end

            def install
              bin.install "shrd"
            end

            test do
              assert_match "shrd", shell_output("#{bin}/shrd --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/shrd.rb
          git commit -m "Update shrd to v${{ steps.vars.outputs.version }}"
          git push
